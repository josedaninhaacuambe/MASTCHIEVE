name: mastchieve_mobile
description: Mastchieve IA - App Mobile para Atletas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP & API
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local Storage (Offline)
  drift: ^2.23.1
  drift_flutter: ^0.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.5
  path: ^1.9.0
  sqflite: ^2.4.0

  # Navigation
  go_router: ^14.6.2

  # UI
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  lottie: ^3.3.1
  animations: ^2.0.11

  # Notifications
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.5
  connectivity_plus: ^6.1.3
  jwt_decoder: ^2.0.1
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
