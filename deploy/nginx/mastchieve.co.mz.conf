# ─────────────────────────────────────────────────────────────────────────────
# NGINX — mastchieve.co.mz
# Colocar em: /etc/nginx/sites-available/mastchieve.co.mz
# Activar com: ln -s /etc/nginx/sites-available/mastchieve.co.mz /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

# ── Frontend (Next.js) — mastchieve.co.mz ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mastchieve.co.mz www.mastchieve.co.mz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mastchieve.co.mz www.mastchieve.co.mz;

    # SSL (Let's Encrypt — certbot auto-preenche isto)
    ssl_certificate     /etc/letsencrypt/live/mastchieve.co.mz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mastchieve.co.mz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Next.js
    location / {
        proxy_pass         http://127.0.0.1:4300;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static files (cache agressivo)
    location /_next/static/ {
        proxy_pass   http://127.0.0.1:4300;
        expires      1y;
        add_header   Cache-Control "public, immutable";
    }

    client_max_body_size 20M;
}

# ── API (NestJS) — api.mastchieve.co.mz ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.mastchieve.co.mz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.mastchieve.co.mz;

    ssl_certificate     /etc/letsencrypt/live/mastchieve.co.mz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mastchieve.co.mz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # API REST
    location /api/ {
        proxy_pass         http://127.0.0.1:4301;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket (notificações em tempo real)
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4301;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Ficheiros de upload
    location /uploads/ {
        alias /var/www/mastchieve/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
    }

    client_max_body_size 15M;
}
