# ─────────────────────────────────────────────────────────────────────────────
# MASTCHIEVE IA — Apache Virtual Hosts (XAMPP Windows)
#
# Copiar este conteúdo para:
#   C:\xampp\apache\conf\extra\httpd-vhosts.conf
#
# Antes de copiar, activar os seguintes módulos em:
#   C:\xampp\apache\conf\httpd.conf
#   (remover o # de cada linha)
#
#   LoadModule proxy_module modules/mod_proxy.so
#   LoadModule proxy_http_module modules/mod_proxy_http.so
#   LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
#   LoadModule rewrite_module modules/mod_rewrite.so
#   LoadModule ssl_module modules/mod_ssl.so
#   LoadModule headers_module modules/mod_headers.so
#   Include conf/extra/httpd-vhosts.conf
# ─────────────────────────────────────────────────────────────────────────────

# ── Frontend (Next.js) — mastchieve.co.mz ─────────────────────────────────────

# Redirecionar HTTP → HTTPS
<VirtualHost *:80>
    ServerName mastchieve.co.mz
    ServerAlias www.mastchieve.co.mz
    Redirect permanent / https://mastchieve.co.mz/
</VirtualHost>

<VirtualHost *:443>
    ServerName mastchieve.co.mz
    ServerAlias www.mastchieve.co.mz

    # SSL — Certificado Let's Encrypt (win-acme)
    SSLEngine on
    SSLCertificateFile    "C:/letsencrypt/mastchieve.co.mz/fullchain.pem"
    SSLCertificateKeyFile "C:/letsencrypt/mastchieve.co.mz/privkey.pem"

    # Cabeçalhos de segurança
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Proxy para Next.js (porta 4300)
    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket do Next.js (hot reload / real-time)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:4300/$1" [P,L]

    ProxyPass        / http://127.0.0.1:4300/
    ProxyPassReverse / http://127.0.0.1:4300/

    # Aumentar limite de upload
    LimitRequestBody 20971520

    ErrorLog  "C:/xampp/apache/logs/mastchieve-web-error.log"
    CustomLog "C:/xampp/apache/logs/mastchieve-web-access.log" combined
</VirtualHost>

# ── API (NestJS) — api.mastchieve.co.mz ──────────────────────────────────────

<VirtualHost *:80>
    ServerName api.mastchieve.co.mz
    Redirect permanent / https://api.mastchieve.co.mz/
</VirtualHost>

<VirtualHost *:443>
    ServerName api.mastchieve.co.mz

    SSLEngine on
    SSLCertificateFile    "C:/letsencrypt/mastchieve.co.mz/fullchain.pem"
    SSLCertificateKeyFile "C:/letsencrypt/mastchieve.co.mz/privkey.pem"

    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket (Socket.IO para notificações em tempo real)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:4301/$1" [P,L]

    # Proxy para NestJS (porta 4301)
    ProxyPass        / http://127.0.0.1:4301/
    ProxyPassReverse / http://127.0.0.1:4301/

    # Timeout aumentado para respostas de IA (podem demorar mais)
    ProxyTimeout 300

    # Ficheiros de upload servidos directamente pelo Apache
    Alias /uploads "C:/mastchieve/uploads"
    <Directory "C:/mastchieve/uploads">
        Options -Indexes
        AllowOverride None
        Require all granted
        Header set Cache-Control "max-age=2592000, public"
    </Directory>

    LimitRequestBody 15728640

    ErrorLog  "C:/xampp/apache/logs/mastchieve-api-error.log"
    CustomLog "C:/xampp/apache/logs/mastchieve-api-access.log" combined
</VirtualHost>
