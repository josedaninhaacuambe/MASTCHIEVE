version: '3.9'

# ─── Mastchieve IA — Portas isoladas para evitar conflitos ───────────────────
# Web:      http://localhost:4300
# API:      http://localhost:4301
# Docs:     http://localhost:4301/api/docs
# n8n:      http://localhost:5791
# Nginx:    http://localhost:4390
# Postgres: localhost:5491
# Redis:    localhost:6491

services:
  postgres:
    image: postgres:16-alpine
    container_name: mastchieve_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mastchieve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mastchieve_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mastchieve_db}
    ports:
      - "5491:5432"
    volumes:
      - mastchieve_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastchieve"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mastchieve_network

  redis:
    image: redis:7-alpine
    container_name: mastchieve_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "6491:6379"
    volumes:
      - mastchieve_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mastchieve_network

  n8n:
    image: n8nio/n8n:latest
    container_name: mastchieve_n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-n8n_secret}
      - N8N_HOST=localhost
      - N8N_PORT=5791
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5791/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-mastchieve}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-mastchieve_secret}
    ports:
      - "5791:5791"
    volumes:
      - mastchieve_n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mastchieve_network

  nginx:
    image: nginx:alpine
    container_name: mastchieve_nginx
    restart: unless-stopped
    ports:
      - "4390:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infra/nginx/conf.d:/etc/nginx/conf.d
      - mastchieve_nginx_logs:/var/log/nginx
    depends_on:
      - postgres
      - redis
    networks:
      - mastchieve_network

volumes:
  mastchieve_postgres_data:
  mastchieve_redis_data:
  mastchieve_n8n_data:
  mastchieve_nginx_logs:

networks:
  mastchieve_network:
    name: mastchieve_network
    driver: bridge
