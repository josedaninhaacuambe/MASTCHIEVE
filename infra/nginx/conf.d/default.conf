# Mastchieve IA — Nginx reverse proxy
# Porta host: 4390 -> container 80
# API:  host.docker.internal:4301
# Web:  host.docker.internal:4300

upstream mastchieve_api {
    server host.docker.internal:4301;
    keepalive 64;
}

upstream mastchieve_web {
    server host.docker.internal:4300;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API routes
    location /api {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://mastchieve_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # Auth routes - stricter rate limit
    location /api/auth {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://mastchieve_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket support
    location /socket.io {
        proxy_pass http://mastchieve_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Web dashboard
    location / {
        proxy_pass http://mastchieve_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
